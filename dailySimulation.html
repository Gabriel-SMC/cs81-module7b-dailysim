<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Daily Schedule Simulation</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 60px; background-color: #eef;">
  <h1>My Simulated Day</h1>
  <div id="output" style="margin-top: 40px; font-size: 1.5rem;"></div>
  <script>
    const output = document.getElementById("output");
    
    const schedule = [
  { time: "07:00 AM", activity: "🌅 Wake up & eat breakfast" },
  { time: "09:00 AM", activity: "🏋️ Workout session" },
  { time: "12:30 PM", activity: "🌮 Lunch break" },
  { time: "03:00 PM", activity: "🎨 Digital illustration & sketching" },
  { time: "06:00 PM", activity: "👾 Playing video games" },
  { time: "08:00 PM", activity: "💻 Productivity: Video editng" },
  { time: "10:00 PM", activity: "😴 Sleeping after hygene" }
];

    const surprises = [
  { mood: "🔥 Focused", perk: "📚 Knowledge and patterns increased"},
  { mood: "🧘 Remaining balanced", perk: "🍎 Healthy mindset"},
  { mood: "🎧 In the zone", perk: "🎶 Optimism increased"},
  { mood: "🏃 Flexible and fit", perk: "💪 Additional stamina"},
  { mood: "⏱️ Staying on time", perk: "😊 Responsibility increased"},
  { mood: "😌 Well rested", perk: "🏆 Confidence increased"}
    ];

let currentIndex = 0;

function updateSchedule() {
  const current = schedule[currentIndex];
  const randomSurprise = surprises[Math.floor(Math.random() * surprises.length)];
  output.innerHTML = `
    <div style="font-size: 1.2rem; color: #666; margin-bottom: 8px;">
      Current Mood: <strong>${randomSurprise.mood}</strong>
    </div>
    
    <strong style="color: #4A90E2; font-size: 1.8rem;">${current.time}</strong><br>
    <div style="margin: 10px 0;">${current.activity}</div>
    
    <div style="font-size: 1rem; color: #e67e22; font-style: italic;">
      Twist: ${randomSurprise.perk}
    </div>
  `;
   currentIndex = (currentIndex + 1) % schedule.length;
}

updateSchedule();
setInterval(updateSchedule, 3000);
  </script>
</body>
</html>
