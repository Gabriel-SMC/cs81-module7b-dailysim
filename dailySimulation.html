<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Daily Schedule Simulation</title>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background-color: #f4f7fe;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      color: #2c3e50;
      margin-bottom: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 420px;
      padding: 30px 25px;
      border: 1px solid #e1e8ed;
      transition: opacity 0.3s ease, transform 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .fade-out {
      opacity: 0;
      transform: translateY(6px);
    }

    .mood-badge {
      display: inline-block;
      font-size: 0.95rem;
      font-weight: 600;
      color: #555;
      background-color: #f0f3f8;
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .time-display {
      color: #3b82f6;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .activity-text {
      font-size: 1.25rem;
      margin: 14px 0;
      font-weight: 500;
      color: #1e293b;
    }

    .perk-text {
      font-size: 1rem;
      color: #d97706;
      font-style: italic;
      background: #fffbe3;
      padding: 8px 12px;
      border-radius: 8px;
      display: inline-block;
      margin-top: 6px;
    }

    .counter {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #94a3b8;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <h1>My Simulated Day</h1>
  
  <div id="output" class="card">
    </div>

  <script>
    const output = document.getElementById("output");

    const schedule = [
      { time: "07:00 AM", activity: "🌅 Wake up & eat breakfast" },
      { time: "09:00 AM", activity: "🏋️ Workout session" },
      { time: "12:30 PM", activity: "🌮 Lunch break" },
      { time: "03:00 PM", activity: "🎨 Digital illustration & sketching" },
      { time: "06:00 PM", activity: "👾 Playing video games" },
      { time: "08:00 PM", activity: "💻 Productivity: Video editing" },
      { time: "10:00 PM", activity: "😴 Sleeping after hygiene" }
    ];

    const surprises = [
      { mood: "🔥 Focused", perk: "📚 Knowledge and patterns increased" },
      { mood: "🧘 Remaining balanced", perk: "🍎 Healthy mindset" },
      { mood: "🎧 In the zone", perk: "🎶 Optimism increased" },
      { mood: "🏃 Flexible and fit", perk: "💪 Additional stamina" },
      { mood: "⏱️ Staying on time", perk: "😊 Responsibility increased" },
      { mood: "😌 Well rested", perk: "🏆 Confidence increased" }
    ];

    let currentIndex = 0;

    function renderCardContent() {
      const current = schedule[currentIndex];
      const randomSurprise = surprises[Math.floor(Math.random() * surprises.length)];

      output.innerHTML = `
        <div class="mood-badge">Current Mood: ${randomSurprise.mood}</div>
        <div class="time-display">${current.time}</div>
        <div class="activity-text">${current.activity}</div>
        <div class="perk-text">✨ Perk: ${randomSurprise.perk}</div>
        <div class="counter">Step ${currentIndex + 1} of ${schedule.length}</div>
      `;
    }

    function updateSchedule() {
      output.classList.add("fade-out");

      setTimeout(() => {
        renderCardContent();
        output.classList.remove("fade-out");
        currentIndex = (currentIndex + 1) % schedule.length;
      }, 300);
    }

    renderCardContent();
    currentIndex = (currentIndex + 1) % schedule.length;
    setInterval(updateSchedule, 3500);
  </script>

</body>
</html>
